<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Dashboard</title>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
/>
<style>
  :root {
    --bg: #0b1020;
    --bg-grad-1: #0e1530;
    --bg-grad-2: #0a0e1c;
    --card: #131a2e;
    --card-2: #18213a;
    --line: #243150;
    --text: #e8edf7;
    --muted: #93a0bd;
    --accent: #5cc8ff;
    --accent-2: #7c83ff;
    --warn: #ffb454;
    --good: #5be0a0;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    --radius: 16px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
      Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 80% -10%, var(--bg-grad-1), transparent 60%),
      radial-gradient(1000px 700px at -10% 110%, #11204a, transparent 55%),
      linear-gradient(160deg, var(--bg-grad-2), var(--bg));
    overflow: hidden; /* keep everything above the fold */
    -webkit-font-smoothing: antialiased;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 12px clamp(10px, 1.6vw, 20px) 14px;
    gap: 10px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    flex: 0 0 auto;
    position: relative;
    z-index: 1200; /* keep header + search dropdown above the Leaflet map */
  }
  .loc { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .loc-line { display: flex; align-items: center; gap: 8px; }
  .loc h1 {
    margin: 0;
    font-size: clamp(17px, 2vw, 23px);
    font-weight: 650;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 42vw;
  }
  .loc .sub { color: var(--muted); font-size: 12.5px; }
  .clock { font-variant-numeric: tabular-nums; }

  #fav-toggle {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 9px;
    padding: 4px 9px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  #fav-toggle:hover { border-color: var(--accent); }
  #fav-toggle.is-fav { color: var(--warn); border-color: var(--warn); }
  #fav-toggle.is-current { color: var(--accent); cursor: default; opacity: 0.85; }

  /* favorites bar */
  .favbar {
    display: flex;
    align-items: center;
    gap: 7px;
    overflow-x: auto;
    flex: 1 1 240px;
    min-width: 0;
    padding-bottom: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .favbar::-webkit-scrollbar { height: 5px; }
  .favbar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .chip {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, background 0.15s;
  }
  .chip:hover { background: var(--card-2); }
  .chip.active { border-color: var(--accent); color: var(--accent); }
  .chip .x {
    margin-left: 1px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }
  .chip .x:hover { color: #ff7a7a; }

  .tools { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  button.tool {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 11px;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  button.tool:hover { background: var(--card-2); border-color: var(--accent); }

  .search { position: relative; display: none; }
  .search input {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    padding: 8px 11px;
    font-size: 13px;
    width: 190px;
    outline: none;
  }
  .search input:focus { border-color: var(--accent); }
  .search .results {
    position: absolute;
    top: 40px; left: 0; right: 0;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    z-index: 40;
    box-shadow: var(--shadow);
  }
  .search .results div {
    padding: 9px 11px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid var(--line);
  }
  .search .results div:last-child { border-bottom: none; }
  .search .results div:hover { background: var(--card); }

  /* ---------- Dashboard grid (fills remaining height) ---------- */
  .dashboard {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(300px, 1fr) minmax(0, 1.55fr);
    grid-template-rows: auto auto 1fr;
    grid-template-areas:
      "current radar"
      "hourly  radar"
      "daily   radar";
    gap: 10px;
  }
  .card {
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    min-height: 0;
  }
  .card h2 {
    margin: 0 0 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.3px;
    color: var(--muted);
    font-weight: 650;
  }

  #current-card { grid-area: current; }
  #hourly-card  { grid-area: hourly; }
  #daily-card   { grid-area: daily; display: flex; flex-direction: column; }
  #radar-card   { grid-area: radar; padding: 0; overflow: hidden; display: flex; flex-direction: column; }

  /* Current */
  .current-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cur-icon { font-size: 46px; line-height: 1; }
  .cur-temp { font-size: clamp(38px, 5vw, 54px); font-weight: 700; line-height: 1; letter-spacing: -1px; }
  .cur-meta { display: flex; flex-direction: column; gap: 2px; }
  .cur-cond { font-size: 16px; font-weight: 600; }
  .cur-feels { color: var(--muted); font-size: 13px; }
  .hilo { margin-left: auto; text-align: right; }
  .hilo .hi { font-size: 18px; font-weight: 650; }
  .hilo .lo { font-size: 18px; font-weight: 650; color: var(--muted); }
  .hilo .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .details {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .detail {
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 8px 10px;
  }
  .detail .k {
    font-size: 10.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; gap: 5px;
  }
  .detail .v { font-size: 16px; font-weight: 650; margin-top: 2px; }
  .detail .v small { font-size: 11.5px; color: var(--muted); font-weight: 500; }

  /* Hourly */
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent;
  }
  .hourly-scroll::-webkit-scrollbar { height: 6px; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .hour {
    flex: 0 0 auto; width: 62px; text-align: center;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid var(--line); border-radius: 11px;
    padding: 8px 4px;
  }
  .hour .t { font-size: 11px; color: var(--muted); }
  .hour .i { font-size: 21px; margin: 3px 0; }
  .hour .tm { font-size: 14px; font-weight: 650; }
  .hour .pp { font-size: 10.5px; color: var(--accent); margin-top: 2px; min-height: 13px; }

  /* Daily */
  .daily-list { display: flex; flex-direction: column; overflow-y: auto; min-height: 0; flex: 1 1 auto;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .daily-list::-webkit-scrollbar { width: 6px; }
  .daily-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .day {
    display: grid;
    grid-template-columns: 64px 30px 1fr auto;
    align-items: center; gap: 10px;
    padding: 7px 4px;
    border-bottom: 1px solid var(--line);
  }
  .day:last-child { border-bottom: none; }
  .day .dn { font-weight: 600; font-size: 13.5px; }
  .day .di { font-size: 20px; text-align: center; }
  .day .dc { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day .dt { font-weight: 650; font-variant-numeric: tabular-nums; font-size: 13.5px; }
  .day .dt .lo { color: var(--muted); }
  .day .pp { color: var(--accent); }

  /* Radar */
  .radar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 8px; flex: 0 0 auto;
  }
  .radar-head h2 { margin: 0; }
  .radar-head-right { display: flex; align-items: center; gap: 12px; }
  .map-style-btn { padding: 4px 9px; font-size: 12px; }
  #map { flex: 1 1 auto; width: 100%; min-height: 0; background: #0a0e1c; }
  .leaflet-container { background: #0a0e1c; }
  .radar-legend { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .radar-legend .bar {
    width: 96px; height: 7px; border-radius: 6px;
    background: linear-gradient(90deg, #1a73e8, #34d399, #fbbf24, #ef4444, #d946ef);
  }

  /* Overlay */
  .status-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 2000; text-align: center; padding: 24px;
  }
  .status-overlay .box { max-width: 420px; }
  .status-overlay h2 { font-size: 19px; margin: 0 0 10px; letter-spacing: 0; text-transform: none; color: var(--text); }
  .status-overlay p { color: var(--muted); line-height: 1.5; }
  .spinner {
    width: 40px; height: 40px; margin: 0 auto 16px;
    border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }

  /* Small screens: allow scrolling, stack into one column */
  @media (max-width: 900px), (max-height: 560px) {
    body { overflow: auto; }
    .app { height: auto; min-height: 100vh; }
    .dashboard {
      grid-template-columns: 1fr;
      grid-template-rows: none;
      grid-template-areas: "current" "hourly" "daily" "radar";
    }
    #map { height: 320px; }
    .loc h1 { max-width: 70vw; }
  }
</style>
</head>
<body>
  <!-- Loading / error overlay -->
  <div class="status-overlay" id="overlay">
    <div class="box">
      <div class="spinner" id="spinner"></div>
      <h2 id="ov-title">Getting your location…</h2>
      <p id="ov-msg">Please allow location access so we can show your local weather.</p>
      <div id="ov-actions" class="hidden" style="margin-top:16px;">
        <button class="tool" id="retry-btn">Try again</button>
        <button class="tool" id="search-btn">Search a city</button>
      </div>
    </div>
  </div>

  <div class="app">
    <header>
      <div class="loc">
        <div class="loc-line">
          <h1><span id="loc-pin">📍</span> <span id="loc-name">—</span></h1>
          <button id="fav-toggle">☆ Save</button>
        </div>
        <span class="sub"><span id="loc-region">—</span> · <span class="clock" id="clock">—</span></span>
      </div>

      <div class="favbar" id="favbar"></div>

      <div class="tools">
        <div class="search" id="search-box">
          <input type="text" id="search-input" placeholder="Search city…" autocomplete="off" />
          <div class="results hidden" id="search-results"></div>
        </div>
        <button class="tool" id="toggle-search" title="Search a location">🔎</button>
        <button class="tool" id="refresh" title="Refresh now">↻</button>
        <button class="tool" id="fullscreen" title="Toggle full screen">⛶</button>
      </div>
    </header>

    <main class="dashboard">
      <section class="card" id="current-card">
        <h2>Current Conditions</h2>
        <div class="current-top">
          <div class="cur-icon" id="cur-icon">⛅</div>
          <div class="cur-temp" id="cur-temp">—°</div>
          <div class="cur-meta">
            <div class="cur-cond" id="cur-cond">—</div>
            <div class="cur-feels">Feels like <span id="cur-feels">—°</span></div>
          </div>
          <div class="hilo">
            <div class="lbl">Today</div>
            <div><span class="hi" id="cur-hi">—°</span> <span class="lo" id="cur-lo">—°</span></div>
          </div>
        </div>
        <div class="details">
          <div class="detail"><div class="k">💨 Wind</div><div class="v" id="d-wind">—</div></div>
          <div class="detail"><div class="k">💧 Humidity</div><div class="v" id="d-humidity">—</div></div>
          <div class="detail"><div class="k">☀️ UV</div><div class="v" id="d-uv">—</div></div>
          <div class="detail"><div class="k">🌡️ Pressure</div><div class="v" id="d-pressure">—</div></div>
          <div class="detail"><div class="k">🌅 Sunrise</div><div class="v" id="d-sunrise">—</div></div>
          <div class="detail"><div class="k">🌇 Sunset</div><div class="v" id="d-sunset">—</div></div>
        </div>
      </section>

      <section class="card" id="hourly-card">
        <h2>Next 24 Hours</h2>
        <div class="hourly-scroll" id="hourly-scroll"></div>
      </section>

      <section class="card" id="daily-card">
        <h2>7-Day Forecast</h2>
        <div class="daily-list" id="daily-list"></div>
      </section>

      <section class="card" id="radar-card">
        <div class="radar-head">
          <h2>Live Radar</h2>
          <div class="radar-head-right">
            <button class="tool map-style-btn" id="map-style" title="Toggle map style">☀️ Light</button>
            <div class="radar-legend"><span>Light</span><span class="bar"></span><span>Heavy</span></div>
          </div>
        </div>
        <div id="map"></div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
  (function () {
    "use strict";

    var REFRESH_MS = 10 * 60 * 1000;
    var FAV_KEY = "wx_favorites_v1";
    var state = {
      lat: null, lon: null, name: "", region: "",
      isCurrent: false,           // is the displayed location the GPS location?
      gps: null,                  // {lat,lon,name,region} device location, always pinned on top
      refreshTimer: null
    };
    var map = null, radarLayer = null, marker = null, baseLayer = null;
    var MAP_STYLE_KEY = "wx_map_style";
    var BASE_TILES = {
      dark:  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      light: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
    };
    var mapStyle = (function(){
      try { return localStorage.getItem(MAP_STYLE_KEY) === "light" ? "light" : "dark"; }
      catch(e){ return "dark"; }
    })();
    // Cap zoom so base tiles stay sharp; radar upscales beyond its native zoom (below).
    var MAP_MAX_ZOOM = 18;

    // ---------- WMO codes ----------
    var WMO = {
      0:["Clear sky","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],
      45:["Fog","🌫️"],48:["Rime fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],
      55:["Heavy drizzle","🌦️"],56:["Freezing drizzle","🌧️"],57:["Freezing drizzle","🌧️"],
      61:["Light rain","🌦️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],66:["Freezing rain","🌧️"],
      67:["Freezing rain","🌧️"],71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],
      77:["Snow grains","🌨️"],80:["Light showers","🌦️"],81:["Showers","🌧️"],82:["Violent showers","⛈️"],
      85:["Snow showers","🌨️"],86:["Snow showers","❄️"],95:["Thunderstorm","⛈️"],
      96:["Thunderstorm + hail","⛈️"],99:["Thunderstorm + hail","⛈️"]
    };
    function wmo(c){ return WMO[c] || ["—","❓"]; }

    function $(id){ return document.getElementById(id); }
    function round(n){ return Math.round(n); }
    function fmtHour(d){ var h=d.getHours(),ap=h>=12?"PM":"AM",h12=h%12||12; return h12+" "+ap; }
    function fmtClockTime(iso){
      var d=new Date(iso),h=d.getHours(),m=d.getMinutes(),ap=h>=12?"PM":"AM",h12=h%12||12;
      return h12+":"+(m<10?"0"+m:m)+" "+ap;
    }
    function windDir(deg){
      var dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      return dirs[Math.round(deg/22.5)%16];
    }
    function dayName(iso,idx){ if(idx===0)return"Today"; return new Date(iso+"T00:00").toLocaleDateString(undefined,{weekday:"short"}); }

    // ---------- Overlay ----------
    function showOverlay(t,m,actions){
      $("overlay").classList.remove("hidden");
      $("ov-title").textContent=t; $("ov-msg").textContent=m;
      $("spinner").classList.toggle("hidden",!!actions);
      $("ov-actions").classList.toggle("hidden",!actions);
    }
    function hideOverlay(){ $("overlay").classList.add("hidden"); }

    // ---------- Clock ----------
    function tickClock(){ $("clock").textContent=new Date().toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }
    setInterval(tickClock,1000); tickClock();

    // ---------- Favorites (localStorage) ----------
    function getFavs(){
      try { var v=JSON.parse(localStorage.getItem(FAV_KEY)); return Array.isArray(v)?v:[]; }
      catch(e){ return []; }
    }
    function setFavs(arr){
      try { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); } catch(e){}
    }
    function sameLoc(a,b){
      return a && b && Math.abs(a.lat-b.lat)<0.02 && Math.abs(a.lon-b.lon)<0.02;
    }
    function isFav(lat,lon){
      return getFavs().some(function(f){ return sameLoc(f,{lat:lat,lon:lon}); });
    }
    function addFav(loc){
      var favs=getFavs();
      if(!favs.some(function(f){return sameLoc(f,loc);})){
        favs.push({name:loc.name,region:loc.region,lat:loc.lat,lon:loc.lon});
        setFavs(favs);
      }
      renderFavBar(); updateSaveBtn();
    }
    function removeFav(lat,lon){
      setFavs(getFavs().filter(function(f){ return !sameLoc(f,{lat:lat,lon:lon}); }));
      renderFavBar(); updateSaveBtn();
    }

    function updateSaveBtn(){
      var b=$("fav-toggle");
      b.classList.remove("is-fav","is-current");
      if(state.isCurrent){
        b.textContent="📍 Current"; b.classList.add("is-current");
      } else if(isFav(state.lat,state.lon)){
        b.textContent="★ Saved"; b.classList.add("is-fav");
      } else {
        b.textContent="☆ Save";
      }
    }

    function renderFavBar(){
      var bar=$("favbar"); bar.innerHTML="";
      // current location chip always first
      if(state.gps){
        bar.appendChild(makeChip({
          name:"Current", region:state.gps.region,
          lat:state.gps.lat, lon:state.gps.lon
        }, true));
      }
      getFavs().forEach(function(f){ bar.appendChild(makeChip(f,false)); });
    }
    function makeChip(loc,isCurrentChip){
      var chip=document.createElement("div");
      chip.className="chip";
      var active = Math.abs(loc.lat-state.lat)<0.02 && Math.abs(loc.lon-state.lon)<0.02;
      if(active) chip.classList.add("active");
      var label=document.createElement("span");
      label.textContent=(isCurrentChip?"📍 ":"")+(loc.name||"Saved");
      chip.appendChild(label);
      chip.addEventListener("click",function(e){
        if(e.target.classList.contains("x")) return;
        selectLocation({
          name:isCurrentChip?(state.gps.name||"Your location"):loc.name,
          region:loc.region, lat:loc.lat, lon:loc.lon
        }, isCurrentChip);
      });
      if(!isCurrentChip){
        var x=document.createElement("span");
        x.className="x"; x.textContent="×"; x.title="Remove favorite";
        x.addEventListener("click",function(e){ e.stopPropagation(); removeFav(loc.lat,loc.lon); });
        chip.appendChild(x);
      }
      return chip;
    }

    $("fav-toggle").addEventListener("click",function(){
      if(state.isCurrent) return; // current is always pinned, nothing to toggle
      if(isFav(state.lat,state.lon)) removeFav(state.lat,state.lon);
      else addFav({name:state.name,region:state.region,lat:state.lat,lon:state.lon});
    });

    // ---------- Location selection ----------
    function selectLocation(loc,isCurrent){
      state.lat=loc.lat; state.lon=loc.lon;
      state.name=loc.name; state.region=loc.region; state.isCurrent=!!isCurrent;
      loadAll();
    }

    // ---------- Startup / GPS ----------
    function start(){
      showOverlay("Getting your location…","Please allow location access so we can show your local weather.",false);
      if(!navigator.geolocation){ noGps("This browser doesn't support geolocation."); return; }
      navigator.geolocation.getCurrentPosition(function(pos){
        var lat=pos.coords.latitude, lon=pos.coords.longitude;
        reverseGeocode(lat,lon).then(function(info){
          state.gps={lat:lat,lon:lon,name:info.name,region:info.region};
          selectLocation({lat:lat,lon:lon,name:info.name,region:info.region}, true);
        });
      }, function(){
        // No GPS: fall back to first favorite if any, else prompt search
        var favs=getFavs();
        if(favs.length){ selectLocation(favs[0],false); }
        else noGps("Location access was denied or unavailable. Search for a city or use a saved favorite.");
      }, {enableHighAccuracy:true,timeout:12000,maximumAge:600000});
    }
    function noGps(msg){ showOverlay("Location unavailable",msg,true); renderFavBar(); }

    function reverseGeocode(lat,lon){
      return fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=en")
        .then(function(r){return r.json();})
        .then(function(j){
          return {
            name: j.city||j.locality||j.principalSubdivision||"Your location",
            region: [j.principalSubdivision,j.countryCode].filter(Boolean).join(", ")
          };
        })
        .catch(function(){ return {name:"Your location", region:lat.toFixed(2)+", "+lon.toFixed(2)}; });
    }

    // ---------- Search ----------
    var searchTimer=null;
    function setupSearch(){
      var input=$("search-input"), box=$("search-results");
      $("toggle-search").addEventListener("click",function(){
        var sb=$("search-box"); var vis=sb.style.display==="block";
        sb.style.display=vis?"none":"block"; if(!vis) input.focus();
      });
      input.addEventListener("input",function(){
        var q=input.value.trim(); clearTimeout(searchTimer);
        if(q.length<2){ box.classList.add("hidden"); return; }
        searchTimer=setTimeout(function(){ doGeocode(q); },280);
      });
      document.addEventListener("click",function(e){
        if(!$("search-box").contains(e.target) && e.target.id!=="toggle-search"){ box.classList.add("hidden"); }
      });
    }
    function doGeocode(q){
      fetch("https://geocoding-api.open-meteo.com/v1/search?count=6&language=en&name="+encodeURIComponent(q))
        .then(function(r){return r.json();})
        .then(function(j){
          var box=$("search-results"); box.innerHTML="";
          if(!j.results||!j.results.length){ box.classList.add("hidden"); return; }
          j.results.forEach(function(res){
            var div=document.createElement("div");
            div.textContent=[res.name,res.admin1,res.country_code].filter(Boolean).join(", ");
            div.addEventListener("click",function(){
              box.classList.add("hidden");
              $("search-box").style.display="none"; $("search-input").value="";
              selectLocation({
                name:res.name,
                region:[res.admin1,res.country_code].filter(Boolean).join(", "),
                lat:res.latitude, lon:res.longitude
              }, false);
            });
            box.appendChild(div);
          });
          box.classList.remove("hidden");
        }).catch(function(){});
    }

    // ---------- Load weather ----------
    function loadAll(){
      hideOverlay();
      $("loc-name").textContent=state.name;
      $("loc-region").textContent=state.region;
      $("loc-pin").textContent=state.isCurrent?"📍":"⭐";
      updateSaveBtn(); renderFavBar();
      fetchWeather();
      initOrMoveMap();
      if(state.refreshTimer) clearInterval(state.refreshTimer);
      state.refreshTimer=setInterval(function(){ fetchWeather(); loadRadar(); }, REFRESH_MS);
    }

    function fetchWeather(){
      var url="https://api.open-meteo.com/v1/forecast"+
        "?latitude="+state.lat+"&longitude="+state.lon+
        "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,"+
          "wind_speed_10m,wind_direction_10m,surface_pressure"+
        "&hourly=temperature_2m,weather_code,precipitation_probability,uv_index"+
        "&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,"+
          "uv_index_max,precipitation_probability_max"+
        "&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch"+
        "&timezone=auto&forecast_days=7";
      fetch(url).then(function(r){return r.json();}).then(renderWeather)
        .catch(function(){ showOverlay("Couldn't load weather","Problem reaching the weather service. Check your connection and try again.",true); });
    }

    function renderWeather(d){
      var cur=d.current, daily=d.daily, hourly=d.hourly;
      var c=wmo(cur.weather_code);
      $("cur-icon").textContent=c[1];
      $("cur-cond").textContent=c[0];
      $("cur-temp").textContent=round(cur.temperature_2m)+"°";
      $("cur-feels").textContent=round(cur.apparent_temperature)+"°";
      $("cur-hi").textContent=round(daily.temperature_2m_max[0])+"°";
      $("cur-lo").textContent=round(daily.temperature_2m_min[0])+"°";
      $("d-wind").innerHTML=round(cur.wind_speed_10m)+" <small>mph "+windDir(cur.wind_direction_10m)+"</small>";
      $("d-humidity").innerHTML=round(cur.relative_humidity_2m)+" <small>%</small>";
      var uvNow=currentHourValue(hourly.time,hourly.uv_index);
      if(uvNow==null) uvNow=daily.uv_index_max[0];
      $("d-uv").innerHTML=(uvNow==null?"—":round(uvNow))+" <small>"+uvLabel(uvNow)+"</small>";
      $("d-pressure").innerHTML=round(cur.surface_pressure)+" <small>hPa</small>";
      $("d-sunrise").textContent=fmtClockTime(daily.sunrise[0]);
      $("d-sunset").textContent=fmtClockTime(daily.sunset[0]);
      renderHourly(hourly);
      renderDaily(daily);
    }

    function currentHourValue(times,values){
      var now=Date.now(),bi=-1,bd=Infinity;
      for(var i=0;i<times.length;i++){ var diff=Math.abs(new Date(times[i]).getTime()-now); if(diff<bd){bd=diff;bi=i;} }
      return bi>=0?values[bi]:null;
    }
    function uvLabel(uv){ if(uv==null)return""; if(uv<3)return"Low"; if(uv<6)return"Moderate"; if(uv<8)return"High"; if(uv<11)return"Very high"; return"Extreme"; }

    function renderHourly(hourly){
      var scroll=$("hourly-scroll"); scroll.innerHTML="";
      var now=Date.now(),start=0,bd=Infinity;
      for(var i=0;i<hourly.time.length;i++){ var diff=Math.abs(new Date(hourly.time[i]).getTime()-now); if(diff<bd){bd=diff;start=i;} }
      var end=Math.min(start+24,hourly.time.length);
      for(var k=start;k<end;k++){
        var d=new Date(hourly.time[k]), code=wmo(hourly.weather_code[k]);
        var pp=hourly.precipitation_probability?hourly.precipitation_probability[k]:null;
        var el=document.createElement("div"); el.className="hour";
        el.innerHTML='<div class="t">'+(k===start?"Now":fmtHour(d))+'</div>'+
          '<div class="i">'+code[1]+'</div>'+
          '<div class="tm">'+round(hourly.temperature_2m[k])+'°</div>'+
          '<div class="pp">'+(pp!=null&&pp>0?"💧"+pp+"%":"")+'</div>';
        scroll.appendChild(el);
      }
    }

    function renderDaily(daily){
      var list=$("daily-list"); list.innerHTML="";
      for(var i=0;i<daily.time.length;i++){
        var code=wmo(daily.weather_code[i]);
        var pp=daily.precipitation_probability_max?daily.precipitation_probability_max[i]:null;
        var row=document.createElement("div"); row.className="day";
        row.innerHTML='<div class="dn">'+dayName(daily.time[i],i)+'</div>'+
          '<div class="di">'+code[1]+'</div>'+
          '<div class="dc">'+code[0]+(pp!=null&&pp>0?' · <span class="pp">💧'+pp+'%</span>':'')+'</div>'+
          '<div class="dt">'+round(daily.temperature_2m_max[i])+'° <span class="lo">'+round(daily.temperature_2m_min[i])+'°</span></div>';
        list.appendChild(row);
      }
    }

    // ---------- Radar ----------
    function setBaseLayer(style){
      if(!map) return;
      mapStyle = (style === "light") ? "light" : "dark";
      if(baseLayer) map.removeLayer(baseLayer);
      baseLayer = L.tileLayer(BASE_TILES[mapStyle], {
        maxZoom: MAP_MAX_ZOOM, maxNativeZoom: MAP_MAX_ZOOM, subdomains: "abcd"
      }).addTo(map);
      baseLayer.bringToBack();           // keep radar overlay on top
      $("map").style.background = (mapStyle === "light") ? "#e6e9ef" : "#0a0e1c";
      var btn = $("map-style");
      if(btn) btn.textContent = (mapStyle === "light") ? "🌙 Dark" : "☀️ Light";
      try { localStorage.setItem(MAP_STYLE_KEY, mapStyle); } catch(e){}
    }

    function initOrMoveMap(){
      if(!map){
        map=L.map("map",{zoomControl:true,attributionControl:false,maxZoom:MAP_MAX_ZOOM}).setView([state.lat,state.lon],7);
        setBaseLayer(mapStyle);
        marker=L.circleMarker([state.lat,state.lon],{radius:6,color:"#5cc8ff",fillColor:"#5cc8ff",fillOpacity:0.9,weight:2}).addTo(map);
        setTimeout(function(){ map.invalidateSize(); },200);
        window.addEventListener("resize",function(){ if(map) map.invalidateSize(); });
      } else {
        map.setView([state.lat,state.lon],7);
        if(marker) marker.setLatLng([state.lat,state.lon]);
        setTimeout(function(){ map.invalidateSize(); },150);
      }
      loadRadar();
    }
    function loadRadar(){
      fetch("https://api.rainviewer.com/public/weather-maps.json")
        .then(function(r){return r.json();})
        .then(function(j){
          if(!map) return;
          var frames=(j.radar&&j.radar.past)?j.radar.past.slice():[];
          if(j.radar&&j.radar.nowcast) frames=frames.concat(j.radar.nowcast);
          if(!frames.length) return;
          var latest=frames[frames.length-1];
          var host=j.host||"https://tilecache.rainviewer.com";
          var url=host+latest.path+"/256/{z}/{x}/{y}/4/1_1.png";
          if(radarLayer) map.removeLayer(radarLayer);
          // RainViewer radar tiles only exist at low zoom; upscale past 12 instead of 404-ing.
          radarLayer=L.tileLayer(url,{opacity:0.6,maxZoom:MAP_MAX_ZOOM,maxNativeZoom:12}).addTo(map);
        }).catch(function(){});
    }

    // ---------- Controls ----------
    $("refresh").addEventListener("click",function(){ fetchWeather(); loadRadar(); });
    $("map-style").addEventListener("click",function(){ setBaseLayer(mapStyle==="dark"?"light":"dark"); });
    $("fullscreen").addEventListener("click",function(){
      if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
      else document.exitFullscreen();
    });
    $("retry-btn").addEventListener("click",start);
    $("search-btn").addEventListener("click",function(){
      hideOverlay(); $("search-box").style.display="block"; $("search-input").focus();
    });

    setupSearch();
    renderFavBar();
    start();
  })();
  </script>
</body>
</html>
